cleaning:
  max_rop_percentile: 99.5
  min_circ: 50.0
  min_rop: 0.5
  min_rpm: 5.0
  rolling_window_rows: 30
  rop_iqr_multiplier: 4.0
  sentinel_value: -999.25
data:
  data_dir: data
  test_wells:
  - drilling_states:
    - 1
    - 3
    - 4
    - 7
    file: DemoWell_Time_1sec.csv
    name: DemoWell
    rop_col: ROPAvg
    separator: ','
  - drilling_states:
    - 1
    - 3
    - 4
    - 7
    - 0
    file: OS-11_Time_30sec.csv
    name: OS11
    rop_col: ROPAvg
    separator: ','
  train_wells:
  - drilling_states:
    - 3
    - 7
    - 11
    file: Camel1_2016_OldGeoTimelog.csv
    name: Camel1_2016_OldGeoTimelog
    rop_col: ROP
    separator: ','
features:
  input_cols:
  - SWOB
  - RPM
  - STOR
  - CIRC
  - SPPA
  - HDTH
  monotone_constraints:
  - 1
  - 1
  - -1
  - 1
  - -1
  - 0
  target_col: ROP
formations:
- Sulaiy
- ETop1
- Mishrif
- Yamama
- Zubair
- Hartha
model:
  colsample_bytree: 0.8
  early_stopping_rounds: 50
  learning_rate: 0.05
  log_transform_target: true
  max_depth: -1
  min_child_samples: 50
  n_estimators: 1000
  num_leaves: 63
  random_state: 42
  reg_alpha: 0.1
  reg_lambda: 1.0
  subsample: 0.8
  test_size: 0.2
optimization:
  bounds:
    CIRC:
    - 150
    - 800
    RPM:
    - 40
    - 200
    SPPA:
    - 500
    - 3500
    STOR:
    - 1
    - 25
    SWOB:
    - 5
    - 50
  de_maxiter: 500
  de_popsize: 20
  de_seed: 42
  de_tol: 1e-6
  local_refinement_candidates: 5
reporting:
  model_dir: models
  output_dir: outputs
safety:
  max_sppa: 3500.0
  min_flow_for_cleaning: 150.0
  motor_stall_torque_fraction: 0.85
  mse_threshold: 0.7
  penalty_weight: 10.0
  stick_slip_rpm_threshold: 0.3
selected_formations: []
selected_wells:
- Camel1_2016_OldGeoTimelog
